name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # GitHub's macOS runners ship full Xcode, so the SwiftUIMacros plugin is
      # present and no SDK pin is needed (the build script's pin only kicks in
      # on Command-Line-Tools-only machines).
      - name: Build (release)
        run: swift build -c release

      - name: Run tests
        run: swift run -c release DockzApp test
